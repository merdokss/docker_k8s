# Values dla Grafana Loki
# Instalacja: helm install loki grafana/loki -n monitoring -f loki-values.yaml

# Single binary mode (prostsze dla demo)
deploymentMode: SingleBinary
singleBinary:
  replicas: 1

lokiCanary:
  enabled: false

test:
  enabled: false

chunksCache:
  enabled: false

# Wyłącz wszystkie inne komponenty
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1
  
  # Storage
  storage:
    type: filesystem
    filesystem:
      chunks_directory: /var/loki/chunks
      rules_directory: /var/loki/rules
  
  # Schema
  schemaConfig:
    configs:
      - from: 2024-01-01
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h
  
  # Retencja
  limits_config:
    retention_period: 720h  # 30 dni
    volume_enabled: true
  
  # Kompresja
  compactor:
    retention_enabled: true
    delete_request_store: filesystem
    retention_delete_delay: 2h
    retention_delete_worker_count: 150

# Service
service:
  type: ClusterIP
  port: 3100

# Persistence
persistence:
  enabled: true
  size: 30Gi
  storageClassName: ""  # Użyj domyślnego storage class

# Resources
resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 2000m
    memory: 4Gi


