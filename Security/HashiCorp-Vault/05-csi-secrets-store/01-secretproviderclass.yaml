apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: vault-myapp-config
  namespace: demo-app
spec:
  # Provider: vault (lub aws, azure, gcp)
  provider: vault

  parameters:
    # Adres Vault wewnątrz klastra
    vaultAddress: "http://vault.vault.svc:8200"

    # Rola Vault K8s Auth (z ćwiczenia 02-k8s-auth)
    roleName: "myapp"

    # Lista obiektów (sekretów) do zamontowania jako pliki
    objects: |
      - objectName: "db_password"
        secretPath: "secret/data/myapp/config"
        secretKey: "db_password"
      - objectName: "api_key"
        secretPath: "secret/data/myapp/config"
        secretKey: "api_key"

  # Opcjonalnie: synchronizacja do K8s Secret
  # Wymaga --set syncSecret.enabled=true w CSI Driver
  secretObjects:
    - secretName: myapp-csi-secret
      type: Opaque
      data:
        - objectName: db_password
          key: db_password
        - objectName: api_key
          key: api_key
