apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-csi
  namespace: demo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: myapp-csi
  template:
    metadata:
      labels:
        app: myapp-csi
    spec:
      serviceAccountName: myapp
      containers:
        - name: app
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "=== Pliki zamontowane przez CSI Secrets Store ==="
              ls -la /mnt/secrets-store/
              echo ""
              echo "db_password: $(cat /mnt/secrets-store/db_password)"
              echo "api_key: $(cat /mnt/secrets-store/api_key)"
              echo ""
              echo "=== Aplikacja działa ==="
              while true; do
                echo "$(date) – db_password: $(cat /mnt/secrets-store/db_password)"
                sleep 30
              done
          volumeMounts:
            - name: secrets-store
              mountPath: "/mnt/secrets-store"
              readOnly: true
          # Opcjonalnie: użyj K8s Secret zsynchronizowanego przez secretObjects
          # env:
          #   - name: DB_PASSWORD
          #     valueFrom:
          #       secretKeyRef:
          #         name: myapp-csi-secret
          #         key: db_password
          resources:
            requests:
              memory: 32Mi
              cpu: 10m
            limits:
              memory: 64Mi
              cpu: 50m
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              # Nazwa SecretProviderClass
              secretProviderClass: vault-myapp-config
