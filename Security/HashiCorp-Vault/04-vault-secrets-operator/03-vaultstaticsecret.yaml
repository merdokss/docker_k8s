# VaultStaticSecret – synchronizuje sekret z Vault do K8s Secret
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: myapp-config
  namespace: demo-app
spec:
  # VaultAuth do użycia (z tego samego namespace)
  vaultAuthRef: default

  # Secret Engine mount path
  mount: secret

  # Typ secret engine
  type: kv-v2

  # Ścieżka do sekretu (bez "secret/data/" – VSO dodaje sam)
  path: myapp/config

  # Konkretna wersja sekretu (opcjonalnie, domyślnie latest)
  # version: 2

  # Docelowy K8s Secret
  destination:
    name: myapp-config
    create: true
    # Typ K8s Secret (domyślnie Opaque)
    type: Opaque
    # Opcjonalnie: dodaj labels/annotations do K8s Secret
    labels:
      app: myapp
      managed-by: vault-secrets-operator

  # Częstotliwość synchronizacji
  refreshAfter: 60s

  # Automatyczny restart Deployment po aktualizacji sekretu
  rolloutRestartTargets:
    - kind: Deployment
      name: myapp-vso
