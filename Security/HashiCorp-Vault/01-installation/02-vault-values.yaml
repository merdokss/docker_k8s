# Helm values dla HashiCorp Vault
# Dokumentacja: https://developer.hashicorp.com/vault/docs/platform/k8s/helm/configuration

global:
  # Włącz TLS na produkcji (wymaga certyfikatów)
  tlsDisable: true

injector:
  # Vault Agent Injector – wstrzykuje sekrety jako sidecar
  enabled: true
  replicas: 1
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 250m

server:
  # Obraz Vault
  image:
    repository: hashicorp/vault
    tag: "1.17.0"

  # Tryb standalone – jeden węzeł z trwałym storage
  standalone:
    enabled: true
    config: |
      ui = true

      listener "tcp" {
        tls_disable = 1
        address     = "[::]:8200"
        cluster_address = "[::]:8201"
      }

      storage "file" {
        path = "/vault/data"
      }

  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 512Mi
      cpu: 500m

  # Persistent Volume Claim dla danych Vault
  dataStorage:
    enabled: true
    size: 2Gi
    storageClass: null  # Użyj domyślnego StorageClass

  # Readiness probe – Vault musi być unsealed
  readinessProbe:
    enabled: true
    path: "/v1/sys/health?standbyok=true"

  # Liveness probe
  livenessProbe:
    enabled: false

  # Service Account
  serviceAccount:
    create: true
    name: "vault"

  # Udostępnij UI
  service:
    enabled: true
    type: ClusterIP
    port: 8200
    targetPort: 8200

ui:
  enabled: true
  serviceType: ClusterIP

