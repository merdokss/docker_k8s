apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
  namespace: demo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
      annotations:
        # Włącz wstrzykiwanie Vault Agent
        vault.hashicorp.com/agent-inject: "true"

        # Rola Vault (z ćwiczenia 02-k8s-auth)
        vault.hashicorp.com/role: "myapp"

        # Adres Vault (domyślnie http://vault.vault.svc:8200)
        vault.hashicorp.com/address: "http://vault.vault.svc:8200"

        # Sekret do wstrzyknięcia – plik zostanie zapisany w /vault/secrets/config
        vault.hashicorp.com/agent-inject-secret-config: "secret/data/myapp/config"

        # Szablon Go – formatuje sekret jako zmienne środowiskowe
        vault.hashicorp.com/agent-inject-template-config: |
          {{- with secret "secret/data/myapp/config" -}}
          export DB_PASSWORD="{{ .Data.data.db_password }}"
          export API_KEY="{{ .Data.data.api_key }}"
          {{- end }}

        # Drugi sekret (opcjonalnie – odkomentuj jeśli istnieje)
        # vault.hashicorp.com/agent-inject-secret-db: "secret/data/myapp/database"
        # vault.hashicorp.com/agent-inject-template-db: |
        #   {{- with secret "secret/data/myapp/database" -}}
        #   export DB_HOST="{{ .Data.data.host }}"
        #   export DB_PORT="{{ .Data.data.port }}"
        #   {{- end }}

        # Odśwież sekrety co 15 minut (dla rotacji)
        vault.hashicorp.com/agent-inject-default-template: "map"

        # Log level Vault Agent
        vault.hashicorp.com/log-level: "info"
    spec:
      serviceAccountName: myapp
      containers:
        - name: app
          # Demo app – busybox wyświetla zawartość pliku sekretów
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "=== Zawartość /vault/secrets/config ==="
              cat /vault/secrets/config
              echo ""
              echo "=== Ładowanie zmiennych środowiskowych ==="
              source /vault/secrets/config
              echo "DB_PASSWORD=$DB_PASSWORD"
              echo "API_KEY=$API_KEY"
              echo ""
              echo "=== Aplikacja działa. Sekrety załadowane z Vault. ==="
              while true; do
                echo "$(date) – sekret: $(cat /vault/secrets/config | grep DB_PASSWORD)"
                sleep 30
              done
          resources:
            requests:
              memory: 32Mi
              cpu: 10m
            limits:
              memory: 64Mi
              cpu: 50m
